<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Site Launcher</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f6f8;
      --panel: #ffffff;
      --text: #17202a;
      --muted: #5e6b7d;
      --line: #d8dee8;
      --accent: #0f766e;
      --accent-dark: #0b5d56;
      --warn: #9a5b13;
      --good: #157347;
      --shadow: 0 10px 28px rgba(17, 24, 39, 0.08);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: Arial, Helvetica, sans-serif;
      color: var(--text);
      background: var(--bg);
    }

    header {
      padding: 30px clamp(18px, 4vw, 48px) 20px;
      border-bottom: 1px solid var(--line);
      background: var(--panel);
    }

    h1 {
      margin: 0 0 8px;
      font-size: clamp(30px, 4vw, 46px);
      line-height: 1.05;
      letter-spacing: 0;
    }

    p {
      margin: 0;
      color: var(--muted);
      font-size: 16px;
      line-height: 1.5;
    }

    main {
      width: min(1260px, calc(100% - 32px));
      margin: 22px auto 44px;
    }

    .toolbar {
      display: grid;
      grid-template-columns: 1fr;
      gap: 12px;
      align-items: center;
      margin-bottom: 18px;
    }

    .search {
      width: 100%;
      min-height: 44px;
      padding: 10px 13px;
      color: var(--text);
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      font: inherit;
      box-shadow: var(--shadow);
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 14px;
    }

    .card {
      display: flex;
      flex-direction: column;
      min-height: 210px;
      padding: 16px;
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      box-shadow: var(--shadow);
    }

    .card h2 {
      margin: 0 0 8px;
      font-size: 20px;
      line-height: 1.2;
      letter-spacing: 0;
    }

    .meta {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-bottom: 12px;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      min-height: 24px;
      padding: 3px 8px;
      color: var(--muted);
      border: 1px solid var(--line);
      border-radius: 999px;
      font-size: 12px;
      font-weight: 700;
      line-height: 1.2;
    }

    .badge.live {
      color: var(--good);
      border-color: rgba(21, 115, 71, 0.35);
      background: rgba(21, 115, 71, 0.08);
    }

    .badge.check {
      color: var(--warn);
      border-color: rgba(154, 91, 19, 0.35);
      background: rgba(154, 91, 19, 0.08);
    }

    .url {
      margin-bottom: 14px;
      color: var(--muted);
      font-size: 14px;
      line-height: 1.45;
      overflow-wrap: anywhere;
    }

    .actions {
      display: flex;
      flex-wrap: wrap;
      gap: 9px;
      margin-top: auto;
    }

    .button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 40px;
      padding: 9px 12px;
      color: var(--text);
      text-decoration: none;
      font-weight: 700;
      background: #f7f9fb;
      border: 1px solid var(--line);
      border-radius: 7px;
    }

    .button.primary {
      color: #ffffff;
      background: var(--accent);
      border-color: var(--accent);
    }

    .button:hover,
    .button:focus {
      border-color: var(--accent);
      outline: none;
    }

    .button.primary:hover,
    .button.primary:focus {
      background: var(--accent-dark);
    }

    .empty {
      display: none;
      padding: 26px;
      text-align: center;
      color: var(--muted);
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      box-shadow: var(--shadow);
    }

    @media (max-width: 760px) {
      .toolbar {
        grid-template-columns: 1fr;
      }

    }
  </style>
</head>
<body>
  <header>
    <h1>Site Launcher</h1>
    <p>Portable links for Brandon's business and organization websites.</p>
  </header>

  <main>
    <div class="toolbar">
      <input class="search" id="search" type="search" placeholder="Search business sites, domains, or repo names" aria-label="Search launcher">
    </div>

    <section class="grid" id="launcherGrid" aria-label="Site links"></section>
    <p class="empty" id="emptyState">No matching sites found.</p>
  </main>

  <script>
    const sites = [
      {
        name: "81 Roofing",
        category: "Website",
        status: "Live",
        url: "https://81roofing.web.app",
        repo: "https://github.com/Strongman1380/81-Roofing-and-Construction.git"
      },
      {
        name: "Coaching With Michelle",
        category: "Website",
        status: "Live",
        url: "https://coaching-michelle.web.app",
        repo: "https://github.com/Strongman1380/coachingwithmichellecheckout.git"
      },
      {
        name: "DB Enterprises",
        category: "Website",
        status: "Live",
        url: "https://db-enterprises-site.web.app",
        repo: "https://github.com/Strongman1380/db-enterprises-crm.git"
      },
      {
        name: "EZ Construction",
        category: "Website",
        status: "Live",
        url: "https://ez-construction.web.app",
        repo: "https://github.com/Strongman1380/Ez-Construction.com.git"
      },
      {
        name: "Florez Behavioral Solutions",
        category: "Website",
        status: "Live",
        url: "https://florez-counseling-app.web.app",
        repo: "https://github.com/Strongman1380/FlorezBehavioralSolutions-HeartlandTaxesBussinessSolutions.git"
      },
      {
        name: "General Exteriors LLC",
        category: "Website",
        status: "Live",
        url: "https://general-exteriors-llc.web.app"
      },
      {
        name: "Hinrichs Specialty Services",
        category: "Website",
        status: "Live",
        url: "https://hsst-site.web.app",
        repo: "https://github.com/Strongman1380/HinrichsSpecialtyServices.git",
        alternateUrl: "https://hinrichs-specialty-services.vercel.app"
      },
      {
        name: "Privacy Fence Construction",
        category: "Website",
        status: "Live",
        url: "https://privacy-fence-construction.web.app",
        repo: "https://github.com/Strongman1380/PrivacyFenceConstruction.com.git",
        alternateUrl: "https://privacyfenceconstruction.com"
      },
      {
        name: "Recovery Connect",
        category: "Website",
        status: "Live",
        url: "https://www.recoveryconnect.app",
        alternateUrl: "https://recovery-connect.web.app"
      },
      {
        name: "Sisters Cafe",
        category: "Website",
        status: "Live",
        url: "https://www.sisterscafe.com",
        repo: "https://github.com/Strongman1380/www.sisterscafe.com.git",
        alternateUrl: "https://sisters-cafe.web.app"
      },
      {
        name: "SOS Counseling",
        category: "Website",
        status: "Live",
        url: "https://www.specializedoutpatientservices.com",
        repo: "https://github.com/Strongman1380/www.specializesoutpatientservices.com.git",
        alternateUrl: "https://sos-counseling.web.app"
      },
      {
        name: "The Next Right Step",
        category: "Website",
        status: "Live",
        url: "https://the-next-right-step.web.app",
        repo: "https://github.com/Strongman1380/www.thenextrightstep.org.git"
      },
      {
        name: "VIP Scented Lounge",
        category: "Website",
        status: "Live",
        url: "https://chinrichs.scentsy.us",
        repo: "https://github.com/Strongman1380/VIP-scented-lounge.git"
      },
      {
        name: "Wallflour Cakes",
        category: "Website",
        status: "Live",
        url: "https://wallflour-cakes.web.app",
        repo: "https://github.com/Strongman1380/wallflour-cakes.git"
      },
      {
        name: "Genorationally Handmade",
        category: "Website",
        status: "Needs check",
        url: "https://genorationallyhandmade.com",
        repo: "https://github.com/Strongman1380/genorationallyhandmade.com.git",
        alternateUrl: "https://genorationallyhandmade.web.app"
      },
      {
        name: "Heartland Boys Home",
        category: "Website",
        status: "Needs check",
        url: "https://www.heartlandboyshomenebraska.org",
        repo: "https://github.com/Strongman1380/heartlandboyshome.git",
        alternateUrl: "https://heartland-boys-home.web.app"
      }
    ];

    const grid = document.querySelector("#launcherGrid");
    const search = document.querySelector("#search");
    const emptyState = document.querySelector("#emptyState");

    function createCard(site) {
      const card = document.createElement("article");
      card.className = "card";
      card.dataset.category = site.category;
      card.dataset.search = [
        site.name,
        site.category,
        site.status,
        site.url,
        site.repo,
        site.alternateUrl
      ].filter(Boolean).join(" ").toLowerCase();

      const title = document.createElement("h2");
      title.textContent = site.name;
      card.append(title);

      const meta = document.createElement("div");
      meta.className = "meta";
      const category = document.createElement("span");
      category.className = "badge";
      category.textContent = site.category;
      const status = document.createElement("span");
      status.className = `badge ${site.status === "Live" ? "live" : "check"}`;
      status.textContent = site.status;
      meta.append(category, status);
      card.append(meta);

      const url = document.createElement("div");
      url.className = "url";
      url.textContent = site.url;
      card.append(url);

      const actions = document.createElement("div");
      actions.className = "actions";
      actions.append(linkButton("Open", site.url, true));
      if (site.alternateUrl) {
        actions.append(linkButton("Alternate", site.alternateUrl, false));
      }
      if (site.repo) {
        actions.append(linkButton("Repo", site.repo, false));
      }
      card.append(actions);

      return card;
    }

    function linkButton(label, href, primary) {
      const link = document.createElement("a");
      link.className = primary ? "button primary" : "button";
      link.href = href;
      link.target = "_blank";
      link.rel = "noopener noreferrer";
      link.textContent = label;
      return link;
    }

    function render() {
      const query = search.value.trim().toLowerCase();
      const cards = Array.from(grid.children);
      let visibleCount = 0;

      cards.forEach((card) => {
        const matchesSearch = !query || card.dataset.search.includes(query);
        const isVisible = matchesSearch;
        card.hidden = !isVisible;
        if (isVisible) visibleCount += 1;
      });

      emptyState.style.display = visibleCount ? "none" : "block";
    }

    sites
      .sort((a, b) => a.name.localeCompare(b.name))
      .forEach((site) => grid.append(createCard(site)));

    search.addEventListener("input", render);
  </script>
</body>
</html>
